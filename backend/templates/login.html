<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · RAZ后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #fdf8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      width: 44px; height: 44px;
      background: #14b8a6;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #fff;
      margin: 0 auto 16px;
    }
    h2 { text-align: center; font-size: 20px; font-weight: 800; color: #1f2937; margin: 0 0 4px; }
    .sub { text-align: center; font-size: 13px; color: #9ca3af; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type=password] {
      width: 100%; padding: 12px 14px; font-size: 15px;
      border: 2px solid #e5e7eb; border-radius: 10px; outline: none;
      transition: border-color .2s;
    }
    input[type=password]:focus { border-color: #14b8a6; }
    .error {
      background: #fef2f2; border: 1px solid #fca5a5;
      color: #dc2626; font-size: 13px;
      border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
    }
    button {
      width: 100%; padding: 13px;
      background: #14b8a6; color: #fff;
      font-size: 15px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      margin-top: 14px; transition: background .2s;
    }
    button:hover { background: #0d9488; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">R</div>
    <h2>RAZ入门测试</h2>
    <p class="sub">后台管理系统</p>
    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="post">
      <label for="pw">管理员密码</label>
      <input type="password" id="pw" name="password" placeholder="请输入密码" autofocus>
      <button type="submit">登 录</button>
    </form>
  </div>
</body>
</html>
